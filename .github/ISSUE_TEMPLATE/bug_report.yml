name: Bug report
description: Report a reproducible problem in har2api.
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. A clear, reproducible bug is the fastest path to a fix.
        Please confirm you're on the latest version and search existing issues first.
  - type: input
    id: version
    attributes:
      label: har2api version
      description: Output of `har2api --version` (or the installed package version).
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one or two sentence description of the bug.
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Output format
      description: Which `--format` were you generating?
      options:
        - openapi (YAML)
        - openapi-json
        - postman
        - curl
        - not format-specific
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >
        The exact command, and a MINIMAL HAR snippet that triggers it.
        IMPORTANT: redact every real token, cookie, and personal detail — a HAR
        contains live credentials. A handful of trimmed entries is ideal.
      placeholder: |
        1. Command: har2api capture.har -f openapi
        2. Minimal HAR (redacted):
           { "log": { "entries": [ ... ] } }
        3. Observe: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
      description: What you expected, and what actually happened (include the exact output / exit code).
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Node version:
        - Package manager + version:
        - How invoked (npx / global / devDependency):
        - Browser the HAR came from (Chrome / Firefox / Edge / other):
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am on the latest version, or noted the version above.
          required: true
        - label: I redacted all real secrets and PII from the HAR snippet and output above.
          required: true
